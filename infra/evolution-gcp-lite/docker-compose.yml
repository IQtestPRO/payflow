services:
  caddy:
    image: caddy:2.8-alpine
    container_name: payflow-evolution-caddy
    restart: unless-stopped
    depends_on:
      evolution-api:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    environment:
      EVOLUTION_DOMAIN: ${EVOLUTION_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - payflow-evolution-caddy-data:/data
      - payflow-evolution-caddy-config:/config

  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: payflow-evolution-api
    restart: unless-stopped
    environment:
      SERVER_URL: https://${EVOLUTION_DOMAIN}
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: ${EVOLUTION_DATABASE_URL}
      DATABASE_CONNECTION_CLIENT_NAME: payflow_evolution
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      DATABASE_SAVE_DATA_LABELS: "true"
      DATABASE_SAVE_DATA_HISTORIC: "true"
      CACHE_REDIS_ENABLED: "false"
      CACHE_REDIS_SAVE_INSTANCES: "false"
      CONFIG_SESSION_PHONE_CLIENT: ${CONFIG_SESSION_PHONE_CLIENT:-PayFlow}
      CONFIG_SESSION_PHONE_NAME: ${CONFIG_SESSION_PHONE_NAME:-Chrome}
      QRCODE_LIMIT: ${QRCODE_LIMIT:-60}
      QRCODE_COLOR: ${QRCODE_COLOR:-#001A42}
      LOG_LEVEL: ${LOG_LEVEL:-ERROR,WARN,INFO}
    volumes:
      - payflow-evolution-instances:/evolution/instances

volumes:
  payflow-evolution-caddy-data:
  payflow-evolution-caddy-config:
  payflow-evolution-instances:
