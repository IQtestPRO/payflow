services:
  caddy:
    image: caddy:2.8-alpine
    container_name: payflow-evolution-caddy
    restart: unless-stopped
    depends_on:
      evolution-api:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    environment:
      EVOLUTION_DOMAIN: ${EVOLUTION_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - payflow-evolution-caddy-data:/data
      - payflow-evolution-caddy-config:/config
    logging: &default-logging
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  evolution-postgres:
    image: postgres:16-alpine
    container_name: payflow-evolution-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${EVOLUTION_POSTGRES_DB}
      POSTGRES_USER: ${EVOLUTION_POSTGRES_USER}
      POSTGRES_PASSWORD: ${EVOLUTION_POSTGRES_PASSWORD}
    volumes:
      - payflow-evolution-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${EVOLUTION_POSTGRES_USER} -d ${EVOLUTION_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *default-logging

  evolution-redis:
    image: redis:7-alpine
    container_name: payflow-evolution-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - payflow-evolution-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *default-logging

  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: payflow-evolution-api
    restart: unless-stopped
    depends_on:
      evolution-postgres:
        condition: service_healthy
      evolution-redis:
        condition: service_healthy
    environment:
      SERVER_URL: https://${EVOLUTION_DOMAIN}
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${EVOLUTION_POSTGRES_USER}:${EVOLUTION_POSTGRES_PASSWORD}@evolution-postgres:5432/${EVOLUTION_POSTGRES_DB}?schema=public
      DATABASE_CONNECTION_CLIENT_NAME: payflow_evolution
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      DATABASE_SAVE_DATA_LABELS: "true"
      DATABASE_SAVE_DATA_HISTORIC: "true"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://evolution-redis:6379/0
      CACHE_REDIS_PREFIX_KEY: payflow_evolution
      CACHE_REDIS_SAVE_INSTANCES: "false"
      CONFIG_SESSION_PHONE_CLIENT: ${CONFIG_SESSION_PHONE_CLIENT:-PayFlow}
      CONFIG_SESSION_PHONE_NAME: ${CONFIG_SESSION_PHONE_NAME:-Chrome}
      QRCODE_LIMIT: ${QRCODE_LIMIT:-60}
      QRCODE_COLOR: ${QRCODE_COLOR:-#001A42}
      LOG_LEVEL: ${LOG_LEVEL:-ERROR,WARN,INFO}
    volumes:
      - payflow-evolution-instances:/evolution/instances
    logging: *default-logging

volumes:
  payflow-evolution-caddy-data:
  payflow-evolution-caddy-config:
  payflow-evolution-postgres-data:
  payflow-evolution-redis-data:
  payflow-evolution-instances:
